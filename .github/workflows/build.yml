name: Build AI Clipper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            frontend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install FFmpeg
        run: |
          choco install ffmpeg -y
          ffmpeg -version

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Python backend with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller backend/backend.spec --distpath dist-backend
          Write-Output "=== dist-backend contents ==="
          Get-ChildItem -Recurse dist-backend | Select-Object FullName
          $dest = "frontend\src-tauri\binaries\ai-clipper-backend-x86_64-pc-windows-msvc.exe"
          New-Item -ItemType Directory -Force -Path "frontend\src-tauri\binaries" | Out-Null
          Copy-Item "dist-backend\ai-clipper-backend.exe" -Destination $dest
          Write-Output "Backend binary copied to $dest"
        shell: pwsh

      - name: Install Node.js dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build Tauri application
        working-directory: ./frontend
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version from tag
        id: get_version
        run: |
          if ("${{ github.ref }}" -match "refs/tags/(.+)") {
            echo "VERSION=${matches[1]}" >> $env:GITHUB_OUTPUT
          } else {
            echo "VERSION=1.0.0" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Rename installer
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $installerPath = Get-ChildItem -Path "frontend\src-tauri\target\release\bundle\nsis\*.exe" | Select-Object -First 1
          if ($installerPath) {
            $newPath = "AI-Clipper-$version-x64-setup.exe"
            Copy-Item $installerPath.FullName -Destination $newPath
            Write-Output "Installer renamed to: $newPath"
          } else {
            Write-Error "Installer file not found!"
          }

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Clipper-installer
          path: AI-Clipper-*.exe
          retention-days: 90

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AI-Clipper-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## AI Clipper v${{ steps.get_version.outputs.VERSION }}
            
            ### What's Included
            - ✅ Complete AI Clipper application
            - ✅ Built-in Python runtime (no Python installation needed)
            - ✅ Built-in FFmpeg (for video processing)
            - ✅ Built-in AI models (Whisper, Gemini)
            - ✅ Modern dark theme UI
            - ✅ API key setup on first launch
            
            ### Installation
            1. Download `AI-Clipper-${{ steps.get_version.outputs.VERSION }}-x64-setup.exe`
            2. Double-click to install
            3. Open the application
            4. Enter your Gemini API key (get it free: https://makersuite.google.com/app/apikey)
            5. Start creating viral clips!
            
            ### System Requirements
            - Windows 10 or later (64-bit)
            - 8 GB RAM minimum (16 GB recommended)
            - 5 GB free disk space
            - Internet connection
            
            ### Documentation
            - [User Guide](https://github.com/${{ github.repository }}/blob/main/docs/USER_GUIDE.md)
            - [API Key Setup Guide](https://github.com/${{ github.repository }}/blob/main/docs/API_KEY_SETUP_GUIDE.md)
            - [Installation Guide](https://github.com/${{ github.repository }}/blob/main/docs/INSTALLATION_GUIDE.md)
            - [API Reference](https://github.com/${{ github.repository }}/blob/main/docs/API_REFERENCE.md)
            - [FAQ](https://github.com/${{ github.repository }}/blob/main/docs/FAQ.md)
            - [Troubleshooting](https://github.com/${{ github.repository }}/blob/main/docs/TROUBLESHOOTING.md)
            
            ### What's New
            - First stable release!
            - Full YouTube video processing
            - AI-powered clip generation
            - Smart viral scoring
            - Ready for TikTok, YouTube Shorts, and Instagram Reels
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Notify build status
        if: always()
        run: |
          if ($env:GITHUB_JOB_STATUS -eq "success") {
            Write-Output "✅ Build succeeded! Check releases for the installer."
          } else {
            Write-Output "❌ Build failed. Check the logs for details."
          }
        env:
          GITHUB_JOB_STATUS: ${{ job.status }}
